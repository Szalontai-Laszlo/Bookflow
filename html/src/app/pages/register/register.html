<!-- fő konténer, háttérszín -->
<div class="flex h-screen bg-gray-300 items-center justify-center">
  
  <!-- register form -->
  <div class="bg-gradient-to-br from-white via-gray-100 to-gray-400 
              shadow-2xl rounded-xl w-full max-w-md p-8 animate-fade-in-up">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-6 text-center drop-shadow-md">
      Regisztráció
    </h1>
    <form name="register-form" 
          class="space-y-5"
          #registerForm="ngForm"
          (ngSubmit)="register()">

      <!-- névv -->
      <div>
        <label for="register-name" 
               class="block text-gray-700 font-medium mb-2">
          Név
        </label>
        <input id="register-name" 
               type="text" 
               name="name"
               [(ngModel)]="name"
               class="w-full px-4 py-2 border rounded-lg 
                      focus:ring-2 focus:ring-rose-500 focus:outline-none" 
               placeholder="Add meg a neved"
               maxlength="150"
               required>
      </div>

      <!-- email -->
      <div>
        <label for="register-email" 
               class="block text-gray-700 font-medium mb-2">
          Email
        </label>
        <input type="email"
               name="email"
               [(ngModel)]="email" 
               class="w-full px-4 py-2 border rounded-lg 
                      focus:ring-2 focus:ring-rose-500 focus:outline-none" 
               placeholder="Add meg az email címed"
               id="register-email"
               maxlength="150"
               required>
      </div>

      <!-- jelszó -->
      <div>
        <label for="register-password" 
               class="block text-gray-700 font-medium mb-2">
          Jelszó
        </label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 name="password"
                 [(ngModel)]="password" 
                 class="w-full px-4 py-2 border rounded-lg 
                        focus:ring-2 focus:ring-rose-500 focus:outline-none" 
                 placeholder="Add meg a jelszavad"
                 id="register-password"
                 maxlength="150"
                 required>

          <!-- jelszó típusát megváltoztató gomb (látható/nem látható) -->
          <button type="button" 
                  (click)="togglePassword()" 
                  class="absolute right-3 top-2 text-gray-600 hover:text-gray-900" 
                  aria-label="Jelszó mutatása/elrejtése">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div>
        <label for="register-passwordValidate" 
               class="block text-gray-700 font-medium mb-2">
          Jelszó
        </label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 name="passwordValidate"
                 [(ngModel)]="passwordValidate" 
                 class="w-full px-4 py-2 border rounded-lg 
                        focus:ring-2 focus:ring-rose-500 focus:outline-none" 
                 placeholder="Add meg a jelszavad"
                 id="register-passwordValidate"
                 maxlength="150"
                 required>

          <!-- jelszó típusát megváltoztató gomb (látható/nem látható) -->
          <button type="button" 
                  (click)="togglePassword()" 
                  class="absolute right-3 top-2 text-gray-600 hover:text-gray-900" 
                  aria-label="Jelszó mutatása/elrejtése">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- nem választó -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Nem</label>
        <div class="flex items-center space-x-6">

          <!-- nő -->
          <label class="flex items-center space-x-2">
            <input type="radio" 
                   name="gender"
                   [(ngModel)]="gender" 
                   required
                   value="female" 
                   class="text-rose-600 focus:ring-rose-500">
            <span>Nő</span>
          </label>
          
          <!-- féfi -->
          <label class="flex items-center space-x-2">
            <input type="radio" 
                   name="gender" 
                   [(ngModel)]="gender" 
                   value="male" 
                   class="text-rose-600 focus:ring-rose-500">
            <span>Férfi</span>
          </label>
        </div>
      </div>

      <!-- regisztráció gomb -->
      <button type="submit"
              class="w-full py-2 rounded-lg text-white font-medium 
                     bg-gradient-to-r from-rose-600 to-red-600 
                     hover:from-rose-700 hover:to-red-700 
                     shadow-md hover:shadow-lg 
                     transform hover:scale-105 transition-all duration-200
                     cursor-pointer"
              [disabled]="registerForm.invalid || password !== passwordValidate"
              [class.opacity-50]="registerForm.invalid || password !== passwordValidate"
              [class.cursor-not-allowed]="registerForm.invalid || password !== passwordValidate">
        Regisztráció
      </button>
    </form>

    <!-- login oldalra irányító hivatkozás vagy mi -->
    <p class="mt-6 text-center text-gray-600">
      Már van fiókod? 
      <a (click)="goToLogin()" 
         class="text-rose-600 font-semibold hover:underline cursor-pointer">
        Jelentkezz be
      </a>
    </p>
  </div>
</div>
